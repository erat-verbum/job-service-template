services:
  app:
    build: .
    ports:
      - "${PORT:-8001}:8001"
    environment:
      - SERVICE_NAME=${SERVICE_NAME:-job-service-template}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8001}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 5
