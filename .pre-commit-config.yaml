repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: make lint
        language: system
        types: [python]
      - id: check
        name: check
        entry: make check
        language: system
        types: [python]
      - id: test-unit
        name: test-unit
        entry: make test-unit
        language: system
        types: [python]
